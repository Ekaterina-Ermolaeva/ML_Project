logistic_regression:
  params:
    max_iter: 500
    penalty: "l2"
    C: 0.1
    random_state: 42

knn:
  param_grid:
    n_neighbors: [3, 5, 10]
    weights: ["uniform", "distance"]
    metric: ["euclidean", "manhattan"]

decision_tree:
  param_grid:
    max_depth: [3, 5, 7, 10, null]
    min_samples_split: [2, 5, 10]
    min_samples_leaf: [1, 2, 4]
  fixed_params:
    criterion: "gini"
    random_state: 42
    ccp_alpha: 0.008

random_forest:
  param_grid:
    n_estimators: [50, 100, 200]
    max_depth: [5, 10, 15, null]
    min_samples_split: [2, 5, 10]
    min_samples_leaf: [1, 2, 4]
    max_features: ['sqrt', 'log2', 0.5]
    max_samples: [0.7, 0.8, 1.0]
    ccp_alpha: [0, 0.001, 0.005]
  fixed_params:
    bootstrap: true
    random_state: 42
    n_jobs: -1

catboost:
  param_grid:
    depth: [3, 4, 6, 8]
    learning_rate: [0.01, 0.05, 0.1]
    iterations: [100, 200, 500]
    l2_leaf_reg: [1, 3, 5]
    bagging_temperature: [0, 0.5, 1]
    border_count: [32, 64, 128]
  fixed_params:
    verbose: 0
    random_seed: 42
    thread_count: -1

lightgbm:
  param_grid:
    n_estimators: [100, 200]
    learning_rate: [0.05, 0.1]
    max_depth: [5, 7]
    num_leaves: [31, 63]
    min_child_samples: [10, 20]
    subsample: [0.8, 1.0]
    colsample_bytree: [0.8, 1.0]
    reg_alpha: [0, 0.01]
    reg_lambda: [0, 0.01]
  fixed_params:
    random_state: 42
    verbose: -1
    n_jobs: -1

xgboost:
  param_grid:
    n_estimators: [100, 200]
    learning_rate: [0.01, 0.1]
    max_depth: [5, 7]
    min_child_weight: [3, 5]
    subsample: [0.8, 1.0]
    colsample_bytree: [0.8, 1.0]
    gamma: [0.01, 0.1]
    reg_alpha: [0.01, 0.1]
    reg_lambda: [0, 0.1]
  fixed_params:
    random_state: 42
    verbosity: 0
    use_label_encoder: false
    n_jobs: -1

neural_network:
  param_grid:
    learning_rate: [0.001, 0.0005]
  fixed_params:
    criterion: "BCELoss"
    optimizer: "Adam"

random_forest_cv:
  param_dist:
    n_estimators: [200, 300, 500, 700, 1000]
    max_depth: [5, 7, 10]
    min_samples_split: [8, 10, 12, 15]
    min_samples_leaf: [4, 6, 8, 10]
    max_features: ['sqrt', 'log2', 0.3, 0.5, 0.7, 0.9]
    max_samples: [0.7, 0.8, 0.9, 1.0]
    ccp_alpha: [0, 0.0001, 0.001, 0.005, 0.01, 0.05]
  fixed_params:
    random_state: 42
    n_jobs: -1
    class_weight: "balanced"
  search_params:
    n_iter: 200
    cv: 5
    scoring: "accuracy"
    random_state: 42
    n_jobs: -1
    verbose: 1

xgboost_cv:
  param_dist:
    n_estimators: [100, 150, 200]
    learning_rate: [0.005, 0.01, 0.02, 0.025, 0.03]
    max_depth: [2, 3, 4, 5]
    min_child_weight: [7, 10, 12, 15]
    subsample: [0.6, 0.7, 0.8, 0.9, 1.0]
    colsample_bytree: [0.6, 0.7, 0.8]
    gamma: [0.1, 0.2, 0.3]
    reg_alpha: [0.1, 0.5]
    reg_lambda: [0.5, 1, 1.5]
  fixed_params:
    random_state: 42
    n_jobs: -1
    verbosity: 0
    use_label_encoder: false
  search_params:
    n_iter: 200
    cv: 5
    scoring: "accuracy"
    random_state: 42
    n_jobs: -1
    verbose: 1

voting_xgb:
  fixed_params:
    voting: "soft"
  search_params:
    n_iter: 30
    cv: 5
    scoring: "accuracy"
    random_state: 42
    n_jobs: -1
    verbose: 1
  
  models:
    xgb1:
      learning_rate: 0.02
      min_child_weight: 7
      subsample: 0.8
      colsample_bytree: 0.7
      gamma: 0.1
      reg_alpha: 0.1
      reg_lambda: 0.5
      random_state: 42
      n_jobs: -1
      verbosity: 0
      use_label_encoder: false
    
    xgb2:
      learning_rate: 0.015
      min_child_weight: 10
      subsample: 0.85
      colsample_bytree: 0.7
      gamma: 0.1
      reg_alpha: 0.1
      reg_lambda: 0.5
      random_state: 43
      n_jobs: -1
      verbosity: 0
      use_label_encoder: false
    
    xgb3:
      learning_rate: 0.01
      min_child_weight: 12
      subsample: 0.75
      colsample_bytree: 0.7
      gamma: 0.1
      reg_alpha: 0.1
      reg_lambda: 0.5
      random_state: 44
      n_jobs: -1
      verbosity: 0
      use_label_encoder: false
  
  param_dist:
    xgb1__n_estimators: [150, 200]
    xgb1__max_depth: [2, 3]
    xgb2__n_estimators: [200, 250]
    xgb2__max_depth: [3, 4]
    xgb3__n_estimators: [250, 300]
    xgb3__max_depth: [4, 5]
    weights: [[1, 1, 1], [2, 1, 1], [1, 2, 1]]

stacking_xgb:
  final_estimator:
    type: "LogisticRegression"
    params:
      C: 1
      max_iter: 1000
  cv: 5
  models:
    xgb1:
      n_estimators: 150
      learning_rate: 0.02
      max_depth: 2
      random_state: 42
    xgb2:
      n_estimators: 200
      learning_rate: 0.015
      max_depth: 3
      random_state: 43
    xgb3:
      n_estimators: 250
      learning_rate: 0.01
      max_depth: 4
      random_state: 44

best_model_rf:
  params:
    n_estimators: 50
    max_depth: 10
    min_samples_split: 10
    min_samples_leaf: 4
    max_features: 0.5
    max_samples: 0.7
    ccp_alpha: 0.005
    random_state: 42
    n_jobs: -1
  cv:
    folds: 5
    scoring: "accuracy"