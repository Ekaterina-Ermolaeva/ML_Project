ridge:
  param_grid:
    alpha: [0.001, 0.01, 0.1, 1, 10, 100, 1000]
  fixed_params:
    random_state: 42

lasso:
  param_grid:
    alpha: [0.001, 0.01, 0.1, 1, 10, 100, 1000]
  fixed_params:
    random_state: 42

elasticnet:
  param_grid:
    alpha: [0.001, 0.01, 0.1, 1, 10, 100, 1000]
    l1_ratio: [0.1, 0.3, 0.5, 0.7, 0.9, 0.95, 1.0]
  fixed_params:
    random_state: 42

knn_regressor:
  param_dist:
    n_neighbors: [3, 5, 7, 9, 11, 15, 20, 25]
    weights: ["uniform", "distance"]
    metric: ["euclidean", "manhattan", "minkowski"]
    p: [1, 2]
    leaf_size: [20, 30, 40, 50]
    algorithm: ["auto", "ball_tree", "kd_tree", "brute"]
  search_params:
    n_iter: 100
    cv: 5
    scoring: "neg_root_mean_squared_error"
    random_state: 42
    n_jobs: -1
    verbose: 1

decision_tree_regressor:
  param_dist:
    max_depth: [5, 10, 20, 30, null]
    min_samples_split: [2, 5, 10, 20]
    min_samples_leaf: [1, 2, 4, 8]
    max_features: ['sqrt', 'log2', null]
    criterion: ['squared_error', 'absolute_error', 'poisson']
  fixed_params:
    random_state: 42
  search_params:
    n_iter: 100
    cv: 5
    scoring: "neg_root_mean_squared_error"
    random_state: 42
    n_jobs: -1
    verbose: 1

random_forest_regressor:
  param_dist:
    n_estimators: [100, 200, 300, 400, 500]
    max_depth: [10, 15, 20, 25, 30, null]
    min_samples_split: [2, 5, 10, 15]
    min_samples_leaf: [1, 2, 4, 6]
    max_features: ['sqrt', 'log2', 0.3, 0.5, 0.7]
    max_samples: [0.7, 0.8, 0.9, 1.0]
    ccp_alpha: [0, 0.001, 0.01, 0.1]
  fixed_params:
    random_state: 42
    n_jobs: -1
  search_params:
    n_iter: 50
    cv: 5
    scoring: "neg_root_mean_squared_error"
    random_state: 42
    n_jobs: -1
    verbose: 1

xgboost_regressor:
  param_dist:
    n_estimators: [100, 200, 300, 400, 500]
    max_depth: [3, 6, 9, 12, 15]
    learning_rate: [0.01, 0.03, 0.05, 0.07, 0.1, 0.2]
    subsample: [0.7, 0.8, 0.9, 1.0]
    colsample_bytree: [0.7, 0.8, 0.9, 1.0]
    min_child_weight: [1, 3, 5, 7]
    gamma: [0, 0.1, 0.2, 0.3]
  fixed_params:
    random_state: 42
    n_jobs: -1
    verbosity: 0
  search_params:
    n_iter: 50
    cv: 5
    scoring: "neg_root_mean_squared_error"
    random_state: 42
    n_jobs: -1
    verbose: 1

catboost_regressor:
  param_dist:
    n_estimators: [100, 200, 300, 400, 500]
    max_depth: [3, 6, 9, 12, 15]
    learning_rate: [0.01, 0.03, 0.05, 0.07, 0.1, 0.2]
    subsample: [0.7, 0.8, 0.9, 1.0]
    colsample_bylevel: [0.7, 0.8, 0.9, 1.0]
    l2_leaf_reg: [1, 3, 5, 7]
    random_strength: [0, 0.1, 0.2, 0.3]
  fixed_params:
    random_state: 42
    verbose: 0
  search_params:
    n_iter: 50
    cv: 5
    scoring: "neg_root_mean_squared_error"
    random_state: 42
    n_jobs: -1
    verbose: 1

neural_network_regressor:
  param_grid:
    learning_rate: [0.001, 0.0005]
  fixed_params:
    criterion: "MSELoss"
    optimizer: "Adam"

random_forest_regressor_advanced:
  param_dist:
    n_estimators: [1000, 1200, 1400, 1600]
    max_depth: [15, 18, 20, 22]
    min_samples_split: [5, 7, 10, 12]
    min_samples_leaf: [4, 6, 8, 10]
    max_features: [0.4, 0.5, 0.6]
    max_samples: [0.7, 0.8, 0.9]
    ccp_alpha: [0, 0.005, 0.01, 0.02]
    min_impurity_decrease: [0, 0.0005, 0.001]
  fixed_params:
    random_state: 42
    n_jobs: -1
  search_params:
    n_iter: 100
    cv: 5
    scoring: "neg_root_mean_squared_error"
    random_state: 42
    n_jobs: -1
    verbose: 1

xgboost_regressor_advanced:
  param_dist:
    n_estimators: [1000, 1200, 1500]
    max_depth: [5, 6, 7]
    learning_rate: [0.003, 0.005, 0.01]
    subsample: [0.5, 0.6, 0.7]
    colsample_bytree: [0.5, 0.6, 0.7]
    colsample_bylevel: [0.5, 0.6, 0.7]
    reg_alpha: [0.2, 0.5, 1.0, 2.0]
    reg_lambda: [1.5, 2.0, 3.0, 5.0]
    min_child_weight: [7, 10, 15, 20]
    gamma: [0.3, 0.5, 0.7, 1.0]
  fixed_params:
    random_state: 42
    n_jobs: -1
    verbosity: 0
  search_params:
    n_iter: 100
    cv: 5
    scoring: "neg_root_mean_squared_error"
    random_state: 42
    n_jobs: -1
    verbose: 1

xgboost_ensemble:
  models_config:
    - 
      n_estimators: 1200
      max_depth: 6
      learning_rate: 0.007
      subsample: 0.6
      colsample_bytree: 0.6
      colsample_bylevel: 0.6
      reg_alpha: 1.0
      reg_lambda: 2.0
      min_child_weight: 10
      gamma: 0.7
    -
      n_estimators: 1500
      max_depth: 5
      learning_rate: 0.005
      subsample: 0.55
      colsample_bytree: 0.55
      colsample_bylevel: 0.55
      reg_alpha: 1.5
      reg_lambda: 3.0
      min_child_weight: 15
      gamma: 1.0
    -
      n_estimators: 1800
      max_depth: 5
      learning_rate: 0.003
      subsample: 0.5
      colsample_bytree: 0.5
      colsample_bylevel: 0.5
      reg_alpha: 2.0
      reg_lambda: 5.0
      min_child_weight: 20
      gamma: 1.5
    -
      n_estimators: 1000
      max_depth: 6
      learning_rate: 0.01
      subsample: 0.65
      colsample_bytree: 0.5
      colsample_bylevel: 0.5
      reg_alpha: 0.5
      reg_lambda: 2.5
      min_child_weight: 12
      gamma: 0.8
    -
      n_estimators: 2000
      max_depth: 7
      learning_rate: 0.002
      subsample: 0.6
      colsample_bytree: 0.6
      colsample_bylevel: 0.6
      reg_alpha: 3.0
      reg_lambda: 4.0
      min_child_weight: 18
      gamma: 1.2
  voting:
    type: "VotingRegressor"
  fixed_params:
    random_state_offset: 42
    n_jobs: -1
    verbosity: 0
    objective: "reg:squarederror"
    eval_metric: "rmse"

